<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forclaw Apparel Store</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .header, .footer { background-color: #f4f4f4; padding: 20px; text-align: center; }
        .product { border: 1px solid #ddd; margin: 10px; padding: 10px; display: inline-block; width: 200px; }
        .product img { width: 100%; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to Forclaw Apparel Store</h1>
    </div>
    <div class="products">
        <div class="product">
            <img src="product1.jpg" alt="Product 1">
            <h3>Men's Red T-Shirt</h3>
            <p>Comfortable and stylish red t-shirt.</p>
            <p>Price: $19.99</p>
            <button>Add to Cart</button>
        </div>
        <div class="product">
            <img src="product2.jpg" alt="Product 2">
            <h3>Women's Blue Dress</h3>
            <p>Elegant blue dress for special occasions.</p>
            <p>Price: $49.99</p>
            <button>Add to Cart</button>
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2026 Forclaw Apparel Brand</p>
    </div>
</body>
</html>
